<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The AdRocket | Performant Growth, Humanized</title>
  </head>
  <body class="bg-brand-ivory text-brand-charcoal min-h-screen">
    <!-- SVG Filter (include once in your document) -->
    <svg width="0" height="0" style="position: absolute; pointer-events: none;">
      <defs>
        <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence 
            type="fractalNoise" 
            baseFrequency="0.025 0.025"
            numOctaves="2" 
            seed="92" 
            result="noise" 
          />
          <feGaussianBlur 
            in="noise" 
            stdDeviation="2" 
            result="blurred" 
          />
          <feDisplacementMap 
            in="SourceGraphic" 
            in2="blurred" 
            scale="65"
            xChannelSelector="R" 
            yChannelSelector="G" 
          />
        </filter>
      </defs>
    </svg>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
